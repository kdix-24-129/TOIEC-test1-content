<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOEIC 英単語・表現マスター v9.0</title>
    <!-- Tailwind CSS (動作実績のあるCDNを使用) -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .custom-shadow { box-shadow: 0 10px 25px -5px rgba(59, 130, 246, 0.08), 0 8px 10px -6px rgba(59, 130, 246, 0.08); }
        .fade-in { animation: fadeIn 0.25s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans min-h-screen pb-12">

    <!-- ナビゲーションバー -->
    <header class="bg-blue-600 text-white shadow-md sticky top-0 z-50">
        <div class="max-w-4xl mx-auto px-4 py-3 flex justify-between items-center">
            <h1 class="text-lg font-black flex items-center gap-2 tracking-wider">
                <i class="fa-solid fa-graduation-cap"></i> TOEIC MASTER v9.0
            </h1>
            <div id="header-actions" class="hidden">
                <button onclick="confirmExit()" class="bg-blue-700 hover:bg-blue-800 text-white px-3 py-1.5 rounded-xl text-sm font-bold transition duration-150 flex items-center gap-1 shadow-inner border border-blue-500 cursor-pointer">
                    <i class="fa-solid fa-arrow-left"></i> 中断して戻る
                </button>
            </div>
        </div>
    </header>

    <main class="max-w-4xl mx-auto px-4 py-6">
        
        <!-- 1. ホーム画面（大判カテゴリ選択 & 10問セクション分割） -->
        <section id="home-view" class="block fade-in">
            <!-- 総合概要 -->
            <div class="bg-white p-6 rounded-2xl custom-shadow mb-8 border border-blue-50 text-center sm:text-left">
                <h2 class="text-sm font-extrabold text-slate-400 uppercase tracking-widest mb-3">全体の学習進捗状況</h2>
                <div class="grid grid-cols-2 sm:grid-cols-3 gap-4 text-center">
                    <div class="bg-blue-50/70 p-3 rounded-2xl border border-blue-100">
                        <p class="text-xs text-slate-500 font-bold mb-1">総登録単語数</p>
                        <p id="total-words-count" class="text-xl sm:text-2xl font-black text-blue-600">196</p>
                    </div>
                    <div class="bg-red-50/70 p-3 rounded-2xl border border-red-100">
                        <p class="text-xs text-slate-500 font-bold mb-1">現在の苦手単語</p>
                        <p id="total-weak-count" class="text-xl sm:text-2xl font-black text-red-500">0</p>
                    </div>
                    <div class="bg-emerald-50/70 p-3 rounded-2xl border border-emerald-100 col-span-2 sm:col-span-1">
                        <p class="text-xs text-slate-500 font-bold mb-1">マスター済みセクション</p>
                        <p id="total-mastered-sections" class="text-xl sm:text-2xl font-black text-emerald-600">0</p>
                    </div>
                </div>
            </div>

            <!-- 主題別大判セクションリスト（JSで自動生成） -->
            <div id="sections-container" class="space-y-8">
                <!-- ここに主題ヘッダーと各セクションカードが10問ずつ自動配置されます -->
            </div>
        </section>

        <!-- 2. クイズ画面 -->
        <section id="quiz-view" class="hidden fade-in">
            <!-- プログレスバー -->
            <div class="w-full bg-slate-200 h-2.5 rounded-full mb-6 overflow-hidden">
                <div id="quiz-progress" class="bg-blue-500 h-2.5 transition-all duration-300" style="width: 0%"></div>
            </div>

            <!-- 情報表示 -->
            <div class="flex justify-between items-center mb-6">
                <div class="flex items-center gap-2 flex-wrap">
                    <span id="quiz-subject" class="text-xs font-bold bg-blue-100 text-blue-800 px-2.5 py-1 rounded-lg border border-blue-200">カテゴリ</span>
                    <span id="quiz-title" class="text-xs font-bold bg-blue-600 text-white px-2.5 py-1 rounded-lg border border-blue-700">Section -</span>
                    <span id="quiz-number" class="text-xs font-bold bg-slate-100 text-slate-700 px-2.5 py-1 rounded-lg border border-slate-200">No. -</span>
                </div>
                <span id="quiz-counter" class="text-sm font-bold text-slate-500">1 / 10 問目</span>
            </div>

            <!-- クイズカード -->
            <div class="bg-white rounded-2xl custom-shadow border border-slate-100 p-6 md:p-8 mb-6">
                <!-- 英語フレーズ・例文表示エリア -->
                <div class="space-y-6">
                    <div>
                        <span class="text-xs font-extrabold uppercase tracking-widest text-blue-500 block mb-2"><i class="fa-solid fa-quote-left mr-1"></i> フレーズ</span>
                        <div class="bg-slate-50 p-5 rounded-xl border border-slate-200 text-center">
                            <!-- フレーズ内の対象単語を赤字ハイライトした英文 -->
                            <p id="quiz-phrase-box" class="text-lg md:text-xl font-bold text-slate-800 leading-relaxed mb-4">---</p>
                            <!-- プレースホルダー(____) -->
                            <p class="text-3xl font-black text-red-500 tracking-widest select-none">(____)</p>
                            <p class="text-xs text-slate-400 font-bold mt-2">※ 赤字部分の「日本語訳」を思い出してください。</p>
                        </div>
                    </div>

                    <!-- 補足としての実践例文表示 -->
                    <div>
                        <span class="text-xs font-extrabold uppercase tracking-widest text-slate-400 block mb-2"><i class="fa-solid fa-paragraph mr-1"></i> 実践例文</span>
                        <div id="quiz-example-box" class="text-base md:text-lg font-medium text-slate-600 leading-relaxed bg-slate-50 p-4 rounded-xl border border-slate-100 min-h-[64px] flex items-center">
                            ---
                        </div>
                    </div>
                </div>

                <!-- 答えセクション（答えボタンを押すまで非表示） -->
                <div id="quiz-answer-section" class="hidden border-t border-slate-100 pt-6 mt-6 fade-in space-y-6">
                    <div class="text-center bg-emerald-50 border border-emerald-100 rounded-2xl py-4">
                        <span class="text-xs font-bold uppercase tracking-wider text-emerald-600 block mb-1">正解の日本語訳</span>
                        <h4 id="quiz-correct-meaning" class="text-2xl md:text-3xl font-black text-emerald-600 tracking-wide">ーーー</h4>
                    </div>

                    <div class="bg-slate-50 text-slate-700 p-4 rounded-xl border border-slate-200 text-sm space-y-3">
                        <div>
                            <span class="text-xs font-bold text-slate-400 block mb-0.5">フレーズの和訳</span>
                            <p id="quiz-phrase-translation" class="font-bold text-slate-800"></p>
                        </div>
                        <div class="border-t border-slate-200 my-2"></div>
                        <div>
                            <span class="text-xs font-bold text-slate-400 block mb-0.5">例文の和訳</span>
                            <p id="quiz-example-translation" class="font-medium text-slate-600"></p>
                        </div>
                    </div>

                    <!-- 音声再生ボタン -->
                    <div class="flex flex-col sm:flex-row gap-3">
                        <button onclick="speakText(true)" class="flex-1 bg-slate-800 hover:bg-slate-900 text-white px-4 py-3 rounded-xl text-sm font-bold flex justify-center items-center gap-2 transition duration-150 cursor-pointer shadow-md">
                            <i class="fa-solid fa-volume-high"></i> フレーズ全体を聴く
                        </button>
                        <button onclick="speakText(false)" class="flex-1 bg-blue-50 hover:bg-blue-100 text-blue-700 border border-blue-200 px-4 py-3 rounded-xl text-sm font-bold flex justify-center items-center gap-2 transition duration-150 cursor-pointer">
                            <i class="fa-solid fa-volume-low"></i> 単語のみを聴く
                        </button>
                    </div>
                </div>
            </div>

            <!-- 操作ボタンエリア -->
            <div id="quiz-action-before" class="block">
                <button onclick="revealAnswer()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-extrabold py-4 rounded-xl shadow-lg transition duration-150 cursor-pointer flex justify-center items-center gap-2 text-lg border-b-4 border-blue-800 active:border-b-0 active:translate-y-1">
                    <i class="fa-solid fa-eye"></i> 答えを見る
                </button>
            </div>

            <div id="quiz-action-after" class="hidden grid grid-cols-2 gap-4">
                <button onclick="submitJudgment(false)" class="bg-red-500 hover:bg-red-600 text-white font-extrabold py-4 rounded-xl shadow-md transition duration-150 cursor-pointer flex justify-center items-center gap-2 text-lg border-b-4 border-red-700 active:border-b-0 active:translate-y-1">
                    <i class="fa-solid fa-xmark text-xl"></i> ✕ 違った
                </button>
                <button onclick="submitJudgment(true)" class="bg-emerald-500 hover:bg-emerald-600 text-white font-extrabold py-4 rounded-xl shadow-md transition duration-150 cursor-pointer flex justify-center items-center gap-2 text-lg border-b-4 border-emerald-700 active:border-b-0 active:translate-y-1">
                    <i class="fa-solid fa-check text-xl"></i> ◯ 合ってた
                </button>
            </div>
        </section>

        <!-- 3. 結果画面 -->
        <section id="result-view" class="hidden fade-in text-center py-8">
            <div class="max-w-md mx-auto bg-white rounded-2xl custom-shadow border border-slate-100 p-8">
                <div class="w-20 h-20 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center mx-auto mb-4 text-4xl">
                    <i class="fa-solid fa-ranking-star"></i>
                </div>
                <h2 class="text-2xl font-black text-slate-900 mb-2">セクション完了！</h2>
                <p id="result-meta" class="text-sm font-bold text-slate-500 mb-6 border-b border-slate-100 pb-4">Category Section</p>
                
                <div class="bg-slate-50 p-4 rounded-xl border border-slate-200 mb-8 flex justify-around">
                    <div>
                        <span class="text-xs font-bold text-slate-400 block mb-1">正解した単語</span>
                        <span id="result-correct" class="text-3xl font-black text-emerald-600">0</span>
                    </div>
                    <div class="border-r border-slate-200"></div>
                    <div>
                        <span class="text-xs font-bold text-slate-400 block mb-1">間違えた単語</span>
                        <span id="result-wrong" class="text-3xl font-black text-red-500">0</span>
                    </div>
                </div>

                <button onclick="backToHome()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3.5 rounded-xl shadow-md transition duration-150 cursor-pointer border-b-4 border-blue-800 active:border-b-0 active:translate-y-1">
                    ホーム画面に戻る
                </button>
            </div>
        </section>

    </main>

    <!-- JSデータおよびロジック -->

                    subject: sub,
                    index: i + 1,
                    words: subWords.slice(i * sectionSize, (i + 1) * sectionSize)
                });
            }
        });

        let currentSection = null;
        let currentQueue = [];
        let currentIndex = 0;
        let isWeakOnlyMode = false;
        let currentCorrectCount = 0;
        let currentWrongCount = 0;

        // 音声認識オブジェクト
        let synth = null;
        try {
            if (typeof window !== 'undefined' && window.speechSynthesis) {
                synth = window.speechSynthesis;
            }
        } catch (e) {
            console.warn("SpeechSynthesis is restricted: ", e);
        }

        // 初期化
        function initApp() {
            renderHome();
        }

        if (document.readyState === "loading") {
            document.addEventListener("DOMContentLoaded", initApp);
        } else {
            initApp();
        }

        // ハイライト正規表現のフォールバック付き適用
        function applyHighlight(text, word, pattern) {
            if (!text) return "";
            const matchPattern = pattern || word;
            try {
                let regex;
                if (!pattern) {
                    const escapedWord = word.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
                    if (escapedWord.length <= 2) {
                        regex = new RegExp(`\\b(${escapedWord})\\b`, 'gi');
                    } else {
                        regex = new RegExp(`(${escapedWord})`, 'gi');
                    }
                } else {
                    if (matchPattern.length <= 2) {
                        regex = new RegExp(`\\b(${matchPattern})\\b`, 'gi');
                    } else {
                        regex = new RegExp(`(${matchPattern})`, 'gi');
                    }
                }
                
                if (matchPattern.toLowerCase() === "or") {
                    regex = /\b(or)\b/gi;
                }
                return text.replace(regex, `<span class="text-red-500 font-extrabold">$1</span>`);
            } catch (e) {
                const safeWord = word.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
                return text.replace(new RegExp(safeWord, 'gi'), `<span class="text-red-500 font-extrabold">$&</span>`);
            }
        }

        // ホーム画面の構築 (セクション10問細分化 + 主題グループ化)
        function renderHome() {
            const container = document.getElementById('sections-container');
            const totalWordsEl = document.getElementById('total-words-count');
            const totalWeakEl = document.getElementById('total-weak-count');
            const totalMasteredEl = document.getElementById('total-mastered-sections');

            if (totalWordsEl) totalWordsEl.innerText = wordData.length;
            if (totalWeakEl) totalWeakEl.innerText = weakWordIds.length;

            if (!container) return;
            container.innerHTML = '';

            let totalMastered = 0;

            subjects.forEach(sub => {
                const subSecs = sections.filter(s => s.subject === sub);
                
                // 主題別ヘッダーの描画
                const headerDiv = document.createElement('div');
                headerDiv.className = "mt-6 mb-4 pb-2 border-b-2 border-blue-100";
                headerDiv.innerHTML = `
                    <h3 class="text-lg font-black text-slate-900 flex items-center gap-2">
                        <i class="fa-solid fa-folder-open text-blue-600"></i> ${sub}
                        <span class="text-xs font-bold bg-blue-100 text-blue-800 px-2.5 py-0.5 rounded-full">${subSecs.length} セクション</span>
                    </h3>
                `;
                container.appendChild(headerDiv);

                // 各セクションカード用グリッド
                const grid = document.createElement('div');
                grid.className = "grid gap-4 sm:grid-cols-2 md:grid-cols-3 mb-8";

                subSecs.forEach(sec => {
                    const weakCount = sec.words.filter(w => weakWordIds.includes(w.id)).length;
                    const secKey = `sec_${sec.id}`;
                    const isCompleted = completedSections.includes(secKey);

                    let statusBadge = '';
                    if (weakCount > 0) {
                        statusBadge = `<span class="text-xs font-bold bg-red-100 text-red-600 px-2.5 py-1 rounded-full"><i class="fa-solid fa-triangle-exclamation"></i> 苦手: ${weakCount}問</span>`;
                    } else if (isCompleted && weakCount === 0) {
                        statusBadge = `<span class="text-xs font-bold bg-emerald-100 text-emerald-700 px-2.5 py-1 rounded-full"><i class="fa-solid fa-star text-amber-400"></i> マスター ✨</span>`;
                        totalMastered++;
                    } else {
                        statusBadge = `<span class="text-xs font-bold bg-slate-100 text-slate-500 px-2.5 py-1 rounded-full">未着手</span>`;
                    }

                    const card = document.createElement('div');
                    card.className = "bg-white p-5 rounded-2xl border border-slate-100 custom-shadow flex flex-col justify-between hover:border-blue-200 transition duration-150";
                    
                    // クリックイベントの引数は「sec.id」という数値のみ。これによりクォーテーションの競合を100%防ぎます。
                    card.innerHTML = `
                        <div>
                            <div class="flex justify-between items-center mb-3">
                                <h4 class="font-black text-slate-800 text-base">Section ${sec.index}</h4>
                                <div>${statusBadge}</div>
                            </div>
                            <p class="text-xs text-slate-400 font-bold mb-4">
                                収録: No.${sec.words[0].id}〜${sec.words[sec.words.length-1].id} (${sec.words.length}語)
                            </p>
                        </div>
                        <div class="grid grid-cols-2 gap-2 mt-auto pt-2">
                            <button onclick="startQuiz(${sec.id}, false)" class="col-span-2 bg-blue-600 hover:bg-blue-700 text-white font-extrabold py-2 rounded-xl text-xs shadow-sm transition duration-150 cursor-pointer text-center">
                                <i class="fa-solid fa-play mr-1"></i> 解く
                            </button>
                            <button onclick="startQuiz(${sec.id}, true)" ${weakCount === 0 ? 'disabled' : ''} class="col-span-2 bg-red-50 hover:bg-red-100 disabled:opacity-40 disabled:hover:bg-red-50 text-red-600 font-bold py-2 rounded-xl text-xs border border-red-200 transition duration-150 cursor-pointer text-center">
                                <i class="fa-solid fa-fire mr-1"></i> 苦手 (${weakCount})
                            </button>
                        </div>
                    `;
                    grid.appendChild(card);
                });

                container.appendChild(grid);
            });

            if (totalMasteredEl) totalMasteredEl.innerText = totalMastered;
        }

        // ビューの一括切り替え（画面要素をすべて隠す確実なロジック）
        function switchView(viewId) {
            document.getElementById('home-view').classList.add('hidden');
            document.getElementById('quiz-view').classList.add('hidden');
            document.getElementById('result-view').classList.add('hidden');
            document.getElementById('header-actions').classList.add('hidden');

            document.getElementById(viewId).classList.remove('hidden');
            if (viewId === 'quiz-view') {
                document.getElementById('header-actions').classList.remove('hidden');
            }
        }

        // クイズ開始 (実証コードに基づいた確実な起動)
        function startQuiz(sectionId, weakOnly) {
            const sec = sections.find(s => s.id === sectionId);
            if (!sec) {
                alert("セクションデータの読み込みに失敗しました。");
                return;
            }

            currentSection = sec;
            isWeakOnlyMode = weakOnly;

            let targetWords = sec.words;
            if (weakOnly) {
                targetWords = targetWords.filter(w => weakWordIds.includes(w.id));
            }

            if (targetWords.length === 0) {
                alert("該当する問題がありません。");
                return;
            }

            // 問題順のシャッフル
            currentQueue = [...targetWords].sort(() => Math.random() - 0.5);
            currentIndex = 0;
            currentCorrectCount = 0;
            currentWrongCount = 0;

            // HTMLに復元された quiz-title の書き換え処理を安全に統合
            const quizTitleEl = document.getElementById('quiz-title');
            if (quizTitleEl) {
                quizTitleEl.innerText = `Section ${sec.index}`;
            }
            
            switchView('quiz-view');
            showQuestion();
        }

        // クイズ問題表示
        function showQuestion() {
            const currentItem = currentQueue[currentIndex];

            // 情報表示
            document.getElementById('quiz-subject').innerText = currentItem.subject;
            document.getElementById('quiz-number').innerText = currentItem.num !== "-" ? `No. ${currentItem.num}` : `No. ${currentItem.id}`;
            document.getElementById('quiz-counter').innerText = `${currentIndex + 1} / ${currentQueue.length} 問目`;
            
            // 進捗バー
            const progressPercent = (currentIndex / currentQueue.length) * 100;
            document.getElementById('quiz-progress').style.width = `${progressPercent}%`;

            // 出題エリア：赤字ハイライトを自動適用して埋め込み
            const highlightedPhrase = applyHighlight(currentItem.phrase, currentItem.word, currentItem.targetMatch);
            const highlightedExample = applyHighlight(currentItem.example, currentItem.word, currentItem.targetMatch);

            document.getElementById('quiz-phrase-box').innerHTML = highlightedPhrase;
            document.getElementById('quiz-example-box').innerHTML = highlightedExample;

            // 答えエリアを非表示
            document.getElementById('quiz-answer-section').classList.add('hidden');
            document.getElementById('quiz-action-before').className = "block";
            document.getElementById('quiz-action-after').className = "hidden";
        }

        // 答えを見る
        function revealAnswer() {
            const currentItem = currentQueue[currentIndex];

            // 回答情報の埋め込み
            document.getElementById('quiz-correct-meaning').innerText = currentItem.meaning;
            document.getElementById('quiz-phrase-translation').innerText = currentItem.phrase_translation;
            document.getElementById('quiz-example-translation').innerText = currentItem.example_translation;

            // 表示切り替え
            document.getElementById('quiz-answer-section').classList.remove('hidden');
            document.getElementById('quiz-action-before').className = "hidden";
            document.getElementById('quiz-action-after').className = "grid grid-cols-2 gap-4";

            // 「答えを見る」を押した後の自動音声再生（speakText）は無効化されたままです。
            // (ユーザーが「聴く」ボタンを手動で押したときのみ発音します)
        }

        // 判定
        function submitJudgment(isCorrect) {
            const currentItem = currentQueue[currentIndex];

            if (isCorrect) {
                currentCorrectCount++;
                // 苦手から削除
                weakWordIds = weakWordIds.filter(id => id !== currentItem.id);
            } else {
                currentWrongCount++;
                // 苦手へ追加
                if (!weakWordIds.includes(currentItem.id)) {
                    weakWordIds.push(currentItem.id);
                }
            }

            try {
                localStorage.setItem('toeic_weak_words_v8', JSON.stringify(weakWordIds));
            } catch (e) {
                console.warn("LocalStorage保存スキップ: ", e);
            }

            currentIndex++;
            if (currentIndex < currentQueue.length) {
                showQuestion();
            } else {
                finishQuiz();
            }
        }

        // クイズ終了
        function finishQuiz() {
            if (!isWeakOnlyMode && currentSection) {
                // セクション内の単語に苦手が残っていなければ「マスター」とする
                const hasAnyWeakLeft = currentSection.words.some(w => weakWordIds.includes(w.id));
                const secKey = `sec_${currentSection.id}`;
                
                if (!hasAnyWeakLeft && !completedSections.includes(secKey)) {
                    completedSections.push(secKey);
                    try {
                        localStorage.setItem('toeic_completed_sections_v8', JSON.stringify(completedSections));
                    } catch (e) {
                        console.warn("LocalStorage保存スキップ: ", e);
                    }
                }
            }

            const subjectMeta = currentSection ? currentSection.subject : '';
            const indexMeta = currentSection ? currentSection.index : '';
            document.getElementById('result-meta').innerText = `${subjectMeta} - Section ${indexMeta}`;
            document.getElementById('result-correct').innerText = currentCorrectCount;
            document.getElementById('result-wrong').innerText = currentWrongCount;

            switchView('result-view');
        }

        // 中断して戻る
        function confirmExit() {
            if (confirm("現在のセクションの学習を中断して、ホーム画面に戻りますか？(今回の進捗は破棄されます)")) {
                backToHome();
            }
        }

        function backToHome() {
            switchView('home-view');
            renderHome();
        }

        // Web Speech API 音声合成 (ラグゼロ・自然速度)
        function speakText(isWholePhrase) {
            if (!synth) {
                try {
                    if (typeof window !== 'undefined' && window.speechSynthesis) {
                        synth = window.speechSynthesis;
                    }
                } catch (e) {
                    console.warn("SpeechSynthesis取得不可: ", e);
                }
            }

            if (synth) {
                try {
                    synth.cancel();
                } catch(e) {
                    console.warn("音声キャンセル失敗: ", e);
                }
            } else {
                return;
            }

            const currentItem = currentQueue[currentIndex];
            let textToSpeak = isWholePhrase ? currentItem.phrase : currentItem.word;

            // 記号や-ingなどのノイズの除去
            textToSpeak = textToSpeak.replace(/-ing/g, "").replace(/\(.*?\)/g, "").trim();

            try {
                const utterance = new SpeechSynthesisUtterance(textToSpeak);
                utterance.lang = 'en-US';
                utterance.rate = 1.0; 
                synth.speak(utterance);
            } catch (e) {
                console.warn("音声再生に失敗しました: ", e);
            }
        }
    </script>
</body>
</html>
